name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (runtime + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage (Docker integration excluded)
        # Coverage is REPORTED, not gated: per design/tool-policy.md sci-adk
        # excludes coverage thresholds, so there is deliberately no
        # --cov-fail-under. The term + xml reports are for reviewers.
        run: python -m pytest -q -m "not integration" --cov=sci_adk --cov-report=term-missing --cov-report=xml
